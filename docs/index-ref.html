<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C3PO-shodan Reference</title>
  <style>
    :root {
      --bg: #06131a;
      --panel: rgba(9, 23, 31, 0.88);
      --panel-strong: rgba(8, 31, 44, 0.94);
      --line: rgba(111, 227, 255, 0.18);
      --text: #e7f7ff;
      --muted: #89a9b7;
      --accent: #52e0ff;
      --warn: #ffb454;
      --danger: #ff6b81;
      --ok: #5bffb3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(82, 224, 255, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 180, 84, 0.10), transparent 30%),
        linear-gradient(180deg, #051018, #08151e 45%, #03070a);
    }
    .shell {
      width: min(1280px, 94vw);
      margin: 0 auto;
      padding: 32px 0 64px;
    }
    .hero, .panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }
    .hero { padding: 28px; }
    .hero h1 { margin: 0 0 10px; }
    .hero p { margin: 0; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }
    .panel { padding: 20px; }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>C3PO-shodan Attack Surface</h1>
      <p>Reference layout for the generated HTML dashboard.</p>
    </section>
    <section class="grid">
      <article class="panel">Summary cards</article>
      <article class="panel">Top hosts</article>
      <article class="panel">IP exposure</article>
      <article class="panel">Screenshot evidence</article>
    </section>
  </div>
</body>
</html>
